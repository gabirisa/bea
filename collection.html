<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection | The Art of Small Things</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #EFE4D5;
      --deep-brown: #3d2f20;
      --text-secondary: #6b5840;
      --sage: #8a9e84;
      --paper-texture: url("images/fondo_textura.png");
    }

    body {
      font-family: 'Lora', Georgia, serif;
      color: var(--deep-brown);
      background-color: var(--cream);
      background-image: var(--paper-texture);
      background-size: 535px 301px;
      background-repeat: repeat;
      overflow-x: hidden;
    }

    .nav-wrapper {
      background-color: var(--cream);
      background-image: var(--paper-texture);
      background-size: 535px 301px;
      background-repeat: repeat;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.03em;
      color: var(--deep-brown);
      line-height: 1.4;
      max-width: 90px;
      text-decoration: none;
    }

    .nav-logo:visited,
    .nav-logo:hover,
    .nav-logo:focus,
    .nav-logo:active {
      color: var(--deep-brown);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Lora', serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--deep-brown);
      text-decoration: none;
      opacity: 0.96;
    }

    .collection-hero {
      padding: 0 0 44px;
      text-align: center;
    }

    .collection-band {
      width: 100%;
      height: clamp(200px, 22vw, 300px);
      margin: 0 0 54px;
      overflow: hidden;
      background-color: var(--cream);
      background-image: var(--paper-texture);
      background-size: 535px 301px;
      background-repeat: repeat;
    }

    .collection-band img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 48%;
      display: block;
    }

    .collection-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 7vw, 88px);
      font-weight: 400;
      line-height: 1;
      margin-bottom: 14px;
    }

    .collection-leaf {
      display: block;
      width: 78px;
      height: auto;
      margin: 0 auto 16px;
      opacity: 0.86;
    }

    .collection-subtitle {
      font-size: clamp(15px, 1.7vw, 18px);
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .collection-grid-wrap {
      position: relative;
      padding: 12px 28px 88px;
    }

    .collection-grid::before,
    .collection-grid::after {
      content: '';
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .collection-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-flow: dense;
      gap: 24px 18px;
      max-width: 1320px;
      margin: 0 auto;
      align-items: start;
    }

    .collection-decoration {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      opacity: 0.72;
    }

    .collection-decoration.flores-secas {
      right: 0;
      top: 4%;
      width: min(360px, 30vw);
    }

    .collection-decoration.ramitas {
      left: -2vw;
      bottom: 4%;
      width: min(340px, 28vw);
      transform: rotate(-10deg);
    }

    .collection-grid::before {
      left: -2%;
      top: 28%;
      width: min(150px, 13vw);
      aspect-ratio: 216 / 147;
      background: url("images/flores.png") center / contain no-repeat;
      opacity: 0.16;
    }

    .collection-grid::after {
      right: 2%;
      bottom: 24%;
      width: min(110px, 10vw);
      aspect-ratio: 1;
      background: url("hojita.png") center / contain no-repeat;
      transform: rotate(18deg);
      opacity: 0.14;
    }

    .product-card {
      position: relative;
      background: var(--cream);
      padding: 12px 12px 32px;
      border: 1px solid rgba(105, 82, 55, 0.1);
      box-shadow: 0 7px 18px rgba(80, 55, 30, 0.07), 0 1px 3px rgba(80, 55, 30, 0.05);
      transform-origin: center top;
    }

    .product-card img {
      width: 100%;
      aspect-ratio: 1 / 1.12;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: saturate(0.9) brightness(0.98);
    }

    .product-card figcaption {
      display: block;
      padding-top: 12px;
      text-align: center;
      font-family: 'Lora', serif;
      font-size: 13px;
      font-style: italic;
      line-height: 1.2;
      color: var(--text-secondary);
    }

    .product-card.is-square img {
      aspect-ratio: 1 / 1;
    }

    .product-card.is-tall img {
      aspect-ratio: 0.78 / 1;
    }

    .product-card.is-wide {
      grid-column: span 2;
    }

    .product-card.is-wide img {
      aspect-ratio: 1.72 / 1;
    }

    .quote-card {
      min-height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px 28px;
      text-align: center;
      background: rgba(239, 228, 213, 0.54);
      border: 1px solid rgba(105, 82, 55, 0.08);
      box-shadow: 0 6px 16px rgba(80, 55, 30, 0.045);
      color: var(--deep-brown);
    }

    .quote-card.is-wide {
      grid-column: span 2;
    }

    .quote-card p {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 3.2vw, 42px);
      font-weight: 400;
      line-height: 1.12;
    }

    .quote-card img {
      display: block;
      width: 64px;
      height: auto;
      margin: 18px auto 0;
      opacity: 0.72;
    }

    .product-card:nth-child(6n+1) { transform: rotate(-1.4deg) translateY(2px); }
    .product-card:nth-child(6n+2) { transform: rotate(0.9deg) translateY(-2px); }
    .product-card:nth-child(6n+3) { transform: rotate(-0.7deg) translateY(1px); }
    .product-card:nth-child(6n+4) { transform: rotate(1.5deg) translateY(0); }
    .product-card:nth-child(6n+5) { transform: rotate(-1deg) translateY(3px); }
    .product-card:nth-child(6n+6) { transform: rotate(0.65deg) translateY(-1px); }

    @media (max-width: 1000px) {
      .collection-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .product-card.is-wide,
      .quote-card.is-wide {
        grid-column: span 2;
      }
    }

    @media (max-width: 700px) {
      nav {
        padding: 16px 20px;
      }

      .nav-links {
        gap: 20px;
      }

      .collection-hero {
        padding: 0 0 32px;
      }

      .collection-band {
        height: 200px;
        margin-bottom: 38px;
      }

      .collection-grid-wrap {
        padding: 8px 18px 64px;
      }

      .collection-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 10px;
      }

      .collection-decoration {
        opacity: 0.22;
      }

      .product-card {
        padding: 9px 9px 26px;
      }

      .product-card.is-wide,
      .quote-card.is-wide {
        grid-column: span 2;
      }

      .quote-card {
        min-height: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="nav-wrapper">
    <nav aria-label="Main navigation">
      <a class="nav-logo" href="index.html">The Art of<br>Small Things</a>
      <ul class="nav-links">
        <li><a href="collection.html" aria-current="page">Collection</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </div>

  <main>
    <section class="collection-hero" aria-label="Collection introduction">
      <div class="collection-band" aria-hidden="true">
        <img src="images/cabecera_vela_bordes.png" alt="" />
      </div>
      <h1 class="collection-title">Collection</h1>
      <img src="hojita.png" alt="" class="collection-leaf" aria-hidden="true" />
      <p class="collection-subtitle">Handcrafted gifts, keepsakes, invitations and thoughtful details.<br>A gathered catalogue of little things, made to be remembered.</p>
    </section>

    <section class="collection-grid-wrap" aria-label="Product collection">
      <img src="images/flores_secas_deco.png" alt="" class="collection-decoration flores-secas" aria-hidden="true" />
      <img src="images/ramitas_deco.png" alt="" class="collection-decoration ramitas" aria-hidden="true" />
      <div class="collection-grid">
        <figure class="product-card is-tall">
          <img src="images/albahaca.png" alt="Basil growing kit with kraft packaging and botanical label" loading="lazy" />
          <figcaption>basil growing kit</figcaption>
        </figure>
        <figure class="product-card is-wide">
          <img src="images/albahaca_conjunto.png" alt="Several basil growing kits arranged together on a wooden table" loading="lazy" />
          <figcaption>growing set</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/albahaca_detalles.png" alt="Basil kit details with cards, eucalyptus, and dried flowers" loading="lazy" />
          <figcaption>botanical details</figcaption>
        </figure>
        <figure class="product-card is-square">
          <img src="images/chuche.png" alt="Sweet favor packaging styled with soft handmade details" loading="lazy" />
          <figcaption>sweet favor</figcaption>
        </figure>
        <figure class="product-card is-square">
          <img src="images/chuche_oscura.png" alt="Warm sweet favor arrangement with darker tones" loading="lazy" />
          <figcaption>warm sweets</figcaption>
        </figure>
        <article class="quote-card is-wide">
          <div>
            <p>Small things become memories.</p>
            <img src="hojita.png" alt="" aria-hidden="true" />
          </div>
        </article>
        <figure class="product-card is-tall">
          <img src="images/bolsa.png" alt="White gift bag tied with ribbon and tag among dried flowers" loading="lazy" />
          <figcaption>gift bag</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/corona.png" alt="Wrapped gifts with decorative wooden wreaths and twine" loading="lazy" />
          <figcaption>wreath wrapping</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/gracias.png" alt="Personalized thank you favor bags and tags with dried flowers" loading="lazy" />
          <figcaption>thank you favors</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/gracias_lata.png" alt="Thank you favor bag, tin, and small wrapped gift" loading="lazy" />
          <figcaption>favor tin</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/gracias_lata_2.png" alt="Thank you tin, tag, favor bag, and striped wrapped gift" loading="lazy" />
          <figcaption>keepsake set</figcaption>
        </figure>
        <article class="quote-card">
          <div>
            <p>Made slowly, kept forever.</p>
            <img src="hojita.png" alt="" aria-hidden="true" />
          </div>
        </article>
        <figure class="product-card is-tall">
          <img src="images/gracias_peq.png" alt="Small thank you favor with dried flowers and a tag" loading="lazy" />
          <figcaption>small thanks</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion_doble.png" alt="Botanical invitation card with flowers and eucalyptus" loading="lazy" />
          <figcaption>botanical invitation</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion_bill.png" alt="Illustrated invitation card styled as a keepsake" loading="lazy" />
          <figcaption>illustrated invitation</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion triple.png" alt="Invitation card with illustrated outdoor scene" loading="lazy" />
          <figcaption>storybook invitation</figcaption>
        </figure>
        <article class="quote-card is-wide">
          <div>
            <p>Every piece begins with a story.</p>
            <img src="hojita.png" alt="" aria-hidden="true" />
          </div>
        </article>
        <figure class="product-card is-wide">
          <img src="images/marco.png" alt="Framed group photo with floral details and thank you tag" loading="lazy" />
          <figcaption>framed memory</figcaption>
        </figure>
        <figure class="product-card is-wide">
          <img src="images/marcos.png" alt="Framed keepsake photos and botanical cards on a table" loading="lazy" />
          <figcaption>keepsake frames</figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
