<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection | The Art of Small Things</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #EFE4D5;
      --deep-brown: #3d2f20;
      --text-secondary: #6b5840;
      --sage: #8a9e84;
      --paper-texture: url("images/fondo_textura.png");
    }

    body {
      font-family: 'Lora', Georgia, serif;
      color: var(--deep-brown);
      background-color: var(--cream);
      background-image: var(--paper-texture);
      background-size: 535px 301px;
      background-repeat: repeat;
      overflow-x: hidden;
    }

    .nav-wrapper {
      background-color: var(--cream);
      background-image: var(--paper-texture);
      background-size: 535px 301px;
      background-repeat: repeat;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.03em;
      color: var(--deep-brown);
      line-height: 1.4;
      max-width: 90px;
      text-decoration: none;
    }

    .nav-logo:visited,
    .nav-logo:hover,
    .nav-logo:focus,
    .nav-logo:active {
      color: var(--deep-brown);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      position: relative;
      font-family: 'Lora', serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--deep-brown);
      text-decoration: none;
      opacity: 0.96;
      padding-bottom: 6px;
      transition: opacity 0.2s ease;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 18px;
      height: 1px;
      background: var(--sage);
      opacity: 0;
      transform: translateX(-50%) scaleX(0);
      transform-origin: center;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      opacity: 1;
    }

    .nav-links a:hover::after,
    .nav-links a[aria-current="page"]::after {
      opacity: 0.78;
      transform: translateX(-50%) scaleX(1);
    }

    .collection-hero {
      padding: 0 0 44px;
      text-align: center;
    }

    .collection-band {
      width: 100%;
      height: clamp(200px, 22vw, 300px);
      margin: 0 0 54px;
      overflow: hidden;
      background-color: var(--cream);
      background-image: var(--paper-texture);
      background-size: 535px 301px;
      background-repeat: repeat;
    }

    .collection-band img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 48%;
      display: block;
    }

    .collection-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 7vw, 88px);
      font-weight: 400;
      line-height: 1;
      margin-bottom: 14px;
    }

    .collection-leaf {
      display: block;
      width: 78px;
      height: auto;
      margin: 0 auto 16px;
      opacity: 0.86;
    }

    .collection-subtitle {
      font-size: clamp(15px, 1.7vw, 18px);
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .collection-grid-wrap {
      position: relative;
      padding: 12px 28px 88px;
    }

    .collection-grid::before,
    .collection-grid::after {
      content: '';
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .collection-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-flow: dense;
      gap: 24px 18px;
      max-width: 1320px;
      margin: 0 auto;
      align-items: start;
    }

    .collection-decoration {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      opacity: 0.72;
    }

    .collection-decoration.flores-secas {
      right: 0;
      top: 4%;
      width: min(360px, 30vw);
    }

    .collection-decoration.ramitas {
      left: -2vw;
      bottom: 4%;
      width: min(340px, 28vw);
      transform: rotate(-10deg);
    }

    .collection-grid::before {
      left: -2%;
      top: 28%;
      width: min(150px, 13vw);
      aspect-ratio: 216 / 147;
      background: url("images/flores.png") center / contain no-repeat;
      opacity: 0.16;
    }

    .collection-grid::after {
      right: 2%;
      bottom: 24%;
      width: min(110px, 10vw);
      aspect-ratio: 1;
      background: url("hojita.png") center / contain no-repeat;
      transform: rotate(18deg);
      opacity: 0.14;
    }

    .product-card {
      position: relative;
      background: var(--cream);
      padding: 12px 12px 32px;
      border: 1px solid rgba(105, 82, 55, 0.1);
      box-shadow: 0 7px 18px rgba(80, 55, 30, 0.07), 0 1px 3px rgba(80, 55, 30, 0.05);
      transform-origin: center top;
      cursor: pointer;
      transition: transform 0.24s ease, box-shadow 0.24s ease;
    }

    .product-card:focus-visible {
      outline: 2px solid rgba(61, 47, 32, 0.55);
      outline-offset: 5px;
    }

    .product-card img {
      width: 100%;
      aspect-ratio: 1 / 1.12;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: saturate(0.9) brightness(0.98);
    }

    .product-card figcaption {
      display: block;
      padding-top: 12px;
      text-align: center;
      font-family: 'Lora', serif;
      font-size: 13px;
      font-style: italic;
      line-height: 1.2;
      color: var(--text-secondary);
    }

    .product-card.is-square img {
      aspect-ratio: 1 / 1;
    }

    .product-card.is-tall img {
      aspect-ratio: 0.78 / 1;
    }

    .product-card.is-wide {
      grid-column: span 2;
    }

    .product-card.is-wide img {
      aspect-ratio: 1.72 / 1;
    }

    .quote-card {
      min-height: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px 28px;
      text-align: center;
      background: rgba(239, 228, 213, 0.54);
      border: 1px solid rgba(105, 82, 55, 0.08);
      box-shadow: 0 6px 16px rgba(80, 55, 30, 0.045);
      color: var(--deep-brown);
    }

    .quote-card.is-wide {
      grid-column: span 2;
    }

    .quote-card p {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 3.2vw, 42px);
      font-weight: 400;
      line-height: 1.12;
    }

    .quote-card img {
      display: block;
      width: 64px;
      height: auto;
      margin: 18px auto 0;
      opacity: 0.72;
    }

    .product-card:nth-child(6n+1) { --card-transform: rotate(-1.4deg) translateY(2px); transform: var(--card-transform); }
    .product-card:nth-child(6n+2) { --card-transform: rotate(0.9deg) translateY(-2px); transform: var(--card-transform); }
    .product-card:nth-child(6n+3) { --card-transform: rotate(-0.7deg) translateY(1px); transform: var(--card-transform); }
    .product-card:nth-child(6n+4) { --card-transform: rotate(1.5deg) translateY(0); transform: var(--card-transform); }
    .product-card:nth-child(6n+5) { --card-transform: rotate(-1deg) translateY(3px); transform: var(--card-transform); }
    .product-card:nth-child(6n+6) { --card-transform: rotate(0.65deg) translateY(-1px); transform: var(--card-transform); }

    .product-card:hover {
      transform: var(--card-transform, rotate(0deg)) scale(1.035);
      box-shadow: 0 12px 26px rgba(80, 55, 30, 0.1), 0 2px 6px rgba(80, 55, 30, 0.06);
      z-index: 4;
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(61, 47, 32, 0.68);
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.24s ease, visibility 0.24s ease;
    }

    .image-lightbox.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .lightbox-panel {
      position: relative;
      max-width: min(92vw, 1120px);
      max-height: 90vh;
      padding: 14px 14px 42px;
      background: var(--cream);
      border: 1px solid rgba(105, 82, 55, 0.12);
      box-shadow: 0 24px 70px rgba(31, 22, 14, 0.32);
      transform: rotate(-0.4deg) scale(0.98);
      transition: transform 0.24s ease;
    }

    .image-lightbox.is-open .lightbox-panel {
      transform: rotate(-0.4deg) scale(1);
    }

    .lightbox-img {
      display: block;
      max-width: calc(92vw - 28px);
      max-height: calc(90vh - 84px);
      object-fit: contain;
    }

    .lightbox-caption {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 13px;
      text-align: center;
      font-size: 14px;
      font-style: italic;
      color: var(--text-secondary);
    }

    .lightbox-close {
      position: absolute;
      top: -16px;
      right: -16px;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(105, 82, 55, 0.16);
      border-radius: 50%;
      background: var(--cream);
      color: var(--deep-brown);
      font-family: Georgia, serif;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(31, 22, 14, 0.18);
    }

    @media (max-width: 1000px) {
      .collection-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .product-card.is-wide,
      .quote-card.is-wide {
        grid-column: span 2;
      }
    }

    @media (max-width: 700px) {
      nav {
        padding: 16px 20px;
      }

      .nav-links {
        gap: 20px;
      }

      .collection-hero {
        padding: 0 0 32px;
      }

      .collection-band {
        height: 200px;
        margin-bottom: 38px;
      }

      .collection-grid-wrap {
        padding: 8px 18px 64px;
      }

      .collection-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 10px;
      }

      .collection-decoration {
        opacity: 0.22;
      }

      .product-card {
        padding: 9px 9px 26px;
      }

      .product-card.is-wide,
      .quote-card.is-wide {
        grid-column: span 2;
      }

      .quote-card {
        min-height: 160px;
      }

      .image-lightbox {
        padding: 18px;
      }

      .lightbox-panel {
        max-width: 94vw;
        padding: 10px 10px 38px;
      }

      .lightbox-img {
        max-width: calc(94vw - 20px);
        max-height: calc(90vh - 76px);
      }
    }
  </style>
</head>
<body>
  <div class="nav-wrapper">
    <nav aria-label="Main navigation">
      <a class="nav-logo" href="index.html">The Art of<br>Small Things</a>
      <ul class="nav-links">
        <li><a href="collection.html" aria-current="page">Collection</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </div>

  <main>
    <section class="collection-hero" aria-label="Collection introduction">
      <div class="collection-band" aria-hidden="true">
        <img src="images/cabecera_vela_bordes.png" alt="" />
      </div>
      <h1 class="collection-title">Collection</h1>
      <img src="hojita.png" alt="" class="collection-leaf" aria-hidden="true" />
      <p class="collection-subtitle">Handcrafted gifts, keepsakes, invitations and thoughtful details.<br>A gathered catalogue of little things, made to be remembered.</p>
    </section>

    <section class="collection-grid-wrap" aria-label="Product collection">
      <img src="images/flores_secas_deco.png" alt="" class="collection-decoration flores-secas" aria-hidden="true" />
      <img src="images/ramitas_deco.png" alt="" class="collection-decoration ramitas" aria-hidden="true" />
      <div class="collection-grid">
        <figure class="product-card is-tall">
          <img src="images/albahaca.png" alt="Basil growing kit with kraft packaging and botanical label" loading="lazy" />
          <figcaption>basil growing kit</figcaption>
        </figure>
        <figure class="product-card is-wide">
          <img src="images/albahaca_conjunto.png" alt="Several basil growing kits arranged together on a wooden table" loading="lazy" />
          <figcaption>growing set</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/albahaca_detalles.png" alt="Basil kit details with cards, eucalyptus, and dried flowers" loading="lazy" />
          <figcaption>botanical details</figcaption>
        </figure>
        <figure class="product-card is-square">
          <img src="images/chuche.png" alt="Sweet favor packaging styled with soft handmade details" loading="lazy" />
          <figcaption>sweet favor</figcaption>
        </figure>
        <figure class="product-card is-square">
          <img src="images/chuche_oscura.png" alt="Warm sweet favor arrangement with darker tones" loading="lazy" />
          <figcaption>warm sweets</figcaption>
        </figure>
        <article class="quote-card is-wide">
          <div>
            <p>Small things become memories.</p>
            <img src="hojita.png" alt="" aria-hidden="true" />
          </div>
        </article>
        <figure class="product-card is-tall">
          <img src="images/bolsa.png" alt="White gift bag tied with ribbon and tag among dried flowers" loading="lazy" />
          <figcaption>gift bag</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/corona.png" alt="Wrapped gifts with decorative wooden wreaths and twine" loading="lazy" />
          <figcaption>wreath wrapping</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/gracias.png" alt="Personalized thank you favor bags and tags with dried flowers" loading="lazy" />
          <figcaption>thank you favors</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/gracias_lata.png" alt="Thank you favor bag, tin, and small wrapped gift" loading="lazy" />
          <figcaption>favor tin</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/gracias_lata_2.png" alt="Thank you tin, tag, favor bag, and striped wrapped gift" loading="lazy" />
          <figcaption>keepsake set</figcaption>
        </figure>
        <article class="quote-card">
          <div>
            <p>Made slowly, kept forever.</p>
            <img src="hojita.png" alt="" aria-hidden="true" />
          </div>
        </article>
        <figure class="product-card is-tall">
          <img src="images/gracias_peq.png" alt="Small thank you favor with dried flowers and a tag" loading="lazy" />
          <figcaption>small thanks</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion_doble.png" alt="Botanical invitation card with flowers and eucalyptus" loading="lazy" />
          <figcaption>botanical invitation</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion_bill.png" alt="Illustrated invitation card styled as a keepsake" loading="lazy" />
          <figcaption>illustrated invitation</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion triple.png" alt="Invitation card with illustrated outdoor scene" loading="lazy" />
          <figcaption>storybook invitation</figcaption>
        </figure>
        <figure class="product-card is-wide">
          <img src="images/invitacion_geles_ruth_pack.jpg" alt="Two printed teacher invitation cards prepared with blue and yellow folders" loading="lazy" />
          <figcaption>teacher invitations</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion_ruth_aventuras.jpg" alt="Illustrated thank you invitation with children looking out over the sea" loading="lazy" />
          <figcaption>adventure invitation</figcaption>
        </figure>
        <figure class="product-card is-tall">
          <img src="images/invitacion_geles_imaginacion.jpg" alt="Illustrated invitation with children entering imaginative worlds through open doors" loading="lazy" />
          <figcaption>imagination invitation</figcaption>
        </figure>
        <article class="quote-card is-wide">
          <div>
            <p>Every piece begins with a story.</p>
            <img src="hojita.png" alt="" aria-hidden="true" />
          </div>
        </article>
        <figure class="product-card is-wide">
          <img src="images/marco.png" alt="Framed group photo with floral details and thank you tag" loading="lazy" />
          <figcaption>framed memory</figcaption>
        </figure>
        <figure class="product-card is-wide">
          <img src="images/marcos.png" alt="Framed keepsake photos and botanical cards on a table" loading="lazy" />
          <figcaption>keepsake frames</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <div class="image-lightbox" id="image-lightbox" aria-hidden="true">
    <figure class="lightbox-panel" role="dialog" aria-modal="true" aria-label="Expanded collection image">
      <button class="lightbox-close" type="button" aria-label="Close image">&times;</button>
      <img class="lightbox-img" src="" alt="" />
      <figcaption class="lightbox-caption"></figcaption>
    </figure>
  </div>

  <script>
    (() => {
      const lightbox = document.getElementById('image-lightbox');
      const lightboxImg = lightbox.querySelector('.lightbox-img');
      const lightboxCaption = lightbox.querySelector('.lightbox-caption');
      const closeButton = lightbox.querySelector('.lightbox-close');
      let lastActiveElement = null;

      document.querySelectorAll('.product-card').forEach((card) => {
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `View ${card.querySelector('figcaption')?.textContent?.trim() || 'image'}`);
      });

      const openLightbox = (card) => {
        const sourceImg = card.querySelector('img');
        const caption = card.querySelector('figcaption')?.textContent?.trim() || sourceImg.alt;

        lastActiveElement = document.activeElement;
        lightboxImg.src = sourceImg.currentSrc || sourceImg.src;
        lightboxImg.alt = sourceImg.alt || caption;
        lightboxCaption.textContent = caption;
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
        closeButton.focus();
      };

      const closeLightbox = () => {
        lightbox.classList.remove('is-open');
        lightbox.setAttribute('aria-hidden', 'true');
        lightboxImg.src = '';
        lastActiveElement?.focus();
      };

      document.addEventListener('click', (event) => {
        const card = event.target.closest('.product-card');
        if (card) openLightbox(card);
      });

      document.addEventListener('keydown', (event) => {
        const card = event.target.closest('.product-card');
        if ((event.key === 'Enter' || event.key === ' ') && card) {
          event.preventDefault();
          openLightbox(card);
        }

        if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
          closeLightbox();
        }
      });

      closeButton.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) closeLightbox();
      });
    })();
  </script>
</body>
</html>
